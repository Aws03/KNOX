server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy API calls to the backend container over the Docker network.
    # "knox-backend" is the container_name from docker-compose.yml.
    location /api/ {
        proxy_pass http://knox-backend:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded files served by the backend's static files middleware.
    location /uploads/ {
        proxy_pass http://knox-backend:5001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA fallback: let React Router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
